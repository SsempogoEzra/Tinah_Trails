<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Tinah Trails Safari</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">TINAH <span>TRAILS</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="safaris.html">Safaris</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <header class="page-header" style="background-image: url('https://images.unsplash.com/photo-1490650404312-a2175773bbf5?auto=format&fit=crop&w=1500');">
        <h1>Get In Touch</h1>
    </header>

    <section class="container">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h3>Contact Details</h3>
                <p><strong>Location:</strong> Kampala, Uganda</p>
                <p><strong>Email:</strong> info@tinahtrails.com</p>
                <p><strong>Phone:</strong> +256 700 000 000</p>
                <br>
                <h3>Follow Our Journey</h3>
                <p>Instagram | Facebook | Twitter</p>
            </div>
            <div class="contact-form-area">
                <form id="safari-form">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <select style="width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 4px;">
                        <option>Interested in...</option>
                        <option>Gorilla Trekking</option>
                        <option>Wildlife Safari</option>
                        <option>Bird Watching</option>
                    </select>
                    <textarea placeholder="Tell us more about your group size and dates..."></textarea>
                    <button type="submit" class="btn">Send My Request</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Tinah Trails Safari Uganda.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
