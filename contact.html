    <header class="page-header" style="background-image: url('https://images.unsplash.com/photo-1490650404312-a2175773bbf5?auto=format&fit=crop&w=1500');">
        <h1>Get In Touch</h1>
    </header>

    <section class="container">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h3>Contact Details</h3>
                <p><strong>Location:</strong> Kampala, Uganda</p>
                <p><strong>Email:</strong> <a href="mailto:tinahtrailssafaris4@gmail.com" style="text-decoration:none; color:inherit;">tinahtrailssafaris4@gmail.com</a></p>
                <p><strong>Phone:</strong> <a href="tel:+256762903555" style="text-decoration:none; color:inherit;">+256 762 903 555</a></p>
                <br>
                <h3>Follow Our Journey</h3>
                <div class="social-icons-row">
                    <a href="https://www.instagram.com/tinahstravel/" target="_blank" aria-label="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://l.instagram.com/?u=https%3A%2F%2Fwww.facebook.com%2Fshare%2F1AganEKAsi%2F%3Futm_source%3Dig%26utm_medium%3Dsocial%26utm_content%3Dlink_in_bio&e=AT6hSf3OlbFdXNbq3v2U4T23AfBGoo44l86GRUVmhbJIh4FmiXcBBTqw5AySnqfF-cpaa1VFmXFvhJsIWGSWQHRJk3H1ivVC_QTKB9BdjQ" target="_blank" aria-label="Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="https://x.com/HubJuice44642" target="_blank" aria-label="X">
                        <i class="fab fa-x-twitter"></i>
                    </a>
                    <a href="https://www.tiktok.com/@tinah.trails.safa?_r=1&_t=ZS-94gdv9tcOWK" target="_blank" aria-label="TikTok">
                        <i class="fab fa-tiktok"></i>
                    </a>
                    <a href="https://whatsapp.com/your-number" target="_blank" aria-label="WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>
            </div>

            <div class="contact-form-area">
                <form id="safari-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Email Address" required>
                    </div>

                    <div class="form-row">
                        <div style="flex: 1;">
                            <label>No. of People</label>
                            <input type="number" min="1" placeholder="e.g. 2" required>
                        </div>
                        <div style="flex: 1;">
                            <label>Origin / Country</label>
                            <input type="text" placeholder="Country" required>
                        </div>
                    </div>

                    <div class="form-group" >
                        <label>Interests / Specific Experiences</label>
                        <textarea id="interest-field" placeholder="Describe what you would want not to miss on this trip (e.g. Gorilla habituation, birding, etc.)" rows="4"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Estimated Budget (USD)</label>
                        <select required style="width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="" disabled selected>Select Budget Range</option>
                            <option value="budget">$1,000 - $2,500(budget)</option>
                            <option value="midrange">$2,500 - $5,000(midrange)</option>
                            <option value="luxury">$5,000 - $10,000(luxury)</option>
                            <option value="ultra-luxury">$10,000+(Royalty)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estimated Budget (UGX)</label>
                        <select required style="width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="" disabled selected>Select Budget Range</option>
                            <option value="budget">Shs.3500000 - Shs.400,0000(budget)</option>
                            <option value="midrange">Shs.400,0000 -Shs.650,0000(midrange)</option>
                            <option value="luxury">Shs.800,000 - Shs.1,500,000(luxury)</option>
                            <option value="ultra-luxury">Shs2,000,000+(Royalty)</option>
                        </select>
                    </div>                    

                    <button type="submit" class="btn full-width">Send My Request</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
